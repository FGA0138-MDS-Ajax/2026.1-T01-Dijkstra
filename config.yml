config.yml 
app:
  name: "SIGEsporte"
  version: "0.0.1"
  debug: true


paths:
  archive_dir: "data/archive"
  storage_dir: "data/raw"
  db_dir: "data/storage"
  raw_db: "data/storage/raw.db"
  final: "data/storage/milu.db"

logging:
  level: "DEBUG"
  format: "[%(levelname)-8s] - %(name)s - %(asctime)s - %(message)s"
  # format: "[%(levelname)s] - %(name)s - %(asctime)s - %(message)s"
  date_format: "%d/%m/%Y %H:%M:%S"
  colors:
    DEBUG: "\x1b[36m"
    INFO: "\x1b[38;5;18m"
    WARNING: "\x1b[33m"
    ERROR: "\x1b[31m"
    CRITICAL: "\x1b[41m"