{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar senha - SIGEsporte</title>
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <style>
    .auth-container {
        max-width: 400px;
        margin: 60px auto;
        padding: 40px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        text-align: center;
    }

    .auth-input {
        width: 100%;
        padding: 12px;
        margin: 10px 0 20px;
        border: 1px solid #96BBAF;
        border-radius: 10px;
        font-family: inherit;
    }

    .auth-label {
        font-weight: 600;
        display: block;
        text-align: left;
    }

    .auth-description {
        color: #555;
        font-size: 0.95rem;
        line-height: 1.5;
        margin-bottom: 25px;
    }
  </style>
</head>
<body>

<header class="site-header">
    <div class="logo-wrap">
      <span class="logo-dentro">
        <img src="{% static 'img/LOGO - SIGESPORTE.png' %}" alt="Logo SIGEsporte">
      </span>
    </div>
    <div class="header-actions">
        <a href="{% url 'login' %}" class="btn-header">< VOLTAR PARA LOGIN</a>
    </div>
</header>

<main>
    <div class="auth-container">
        <h2 style="color: var(--azul_unb); margin-bottom: 15px;">Esqueci minha senha</h2>

        <p class="auth-description">
            Informe seu e-mail cadastrado para receber as instruções de redefinição de senha.
        </p>

        <form method="POST" action="{% url 'esqueceu_senha' %}">
            {% csrf_token %}

            <label class="auth-label" for="email">E-mail</label>
            <input
                type="email"
                id="email"
                name="email"
                class="auth-input"
                placeholder="usuario@exemplo.com"
                required
            >

            <button type="submit" class="btn-header" style="border:none; cursor:pointer; width: 100%;">
                ENVIAR INSTRUÇÕES
            </button>
        </form>

        <p style="margin-top: 25px; font-size: 0.9rem; color: #555;">
            Lembrou sua senha?
            <a href="{% url 'login' %}" style="color: var(--azul_unb); font-weight: 700; text-decoration: none;">
                Entrar
            </a>
        </p>
    </div>
</main>

<footer>&copy; 2026 SIGEsporte</footer>
</body>
</html>
