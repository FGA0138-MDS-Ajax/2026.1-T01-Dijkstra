{% extends 'core/base.html' %}
{% load static %}

{% block extra_css %}
<style>
    .auth-container {
        max-width: 500px;
        margin: 40px auto;
        padding: 40px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        text-align: center;
    }
    .auth-input {
        width: 100%;
        padding: 10px;
        margin: 5px 0 15px;
        border: 1px solid #96BBAF;
        border-radius: 10px;
        font-family: inherit;
    }
    .auth-label {
        font-weight: 600;
        display: block;
        text-align: left;
        font-size: 0.95rem;
    }
</style>
{% endblock %}

{% block content %}
<main>
    <div class="auth-container">
        <h2 style="color: var(--azul_unb); margin-bottom: 20px;">CADASTRAR</h2>
        
        <form method="POST" action="{% url 'cadastro' %}">
            {% csrf_token %}
            
            <label class="auth-label">Nome:</label>
            <input type="text" name="nome" class="auth-input" required>
            
            <label class="auth-label">Matrícula:</label>
            <input type="text" name="matricula" class="auth-input" required>

            <div style="text-align: left; margin-bottom: 15px;">
                <label class="auth-label" style="margin-bottom: 5px;">Tipo de Perfil:</label>
                <input type="radio" name="tipo" value="aluno" id="aluno" required> <label for="aluno" style="margin-right: 15px;">Aluno</label>
                <input type="radio" name="tipo" value="organizador" id="org"> <label for="org">Organizador</label>
            </div>
            
            <label class="auth-label">Senha:</label>
            <input type="password" name="senha" class="auth-input" required>
            
            <label class="auth-label">Confirmar senha:</label>
            <input type="password" name="confirmar_senha" class="auth-input" required>

            <div style="text-align: left; margin-bottom: 20px; font-size: 0.9rem;">
                <input type="checkbox" required id="termos">
                <label for="termos">Li e aceito os Termos de Uso</label>
            </div>
            
            <button type="submit" class="btn-header" style="border:none; cursor:pointer; width: 100%;">CRIAR CONTA</button>
        </form>

        <p style="margin-top: 20px; font-size: 0.9rem; color: #555;">
            Já tem conta? <a href="{% url 'login' %}" style="color: var(--azul_unb); font-weight: 700; text-decoration: none;">ENTRAR ></a>
        </p>
    </div>
</main>
{% endblock %}
