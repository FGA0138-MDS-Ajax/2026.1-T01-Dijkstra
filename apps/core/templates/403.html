{% extends 'core/base.html' %}
{% load static %}

{% block extra_css %}
  <link rel="stylesheet" href="{% static 'css/espacos.css' %}">
{% endblock %}

{% block content %}
<main>

  <div class="espaco-form-card" style="max-width: 520px; text-align: center; margin: 60px auto;">

    <h3 style="color: #333; margin-bottom: 16px;">Acesso Negado</h3>

    <p style="margin: 0 0 28px;">
      Você não tem permissão para acessar esta página.<br>
    </p>

    <div class="form-acoes" style="justify-content: center;">
      {% if user.is_authenticated %}
      <a href="{% url 'home' %}" class="btn-cancelar-form">Voltar à Home</a>
      {% else %}
      <a href="{% url 'home' %}" class="btn-cancelar-form">Voltar à Home</a>
      <a href="{% url 'login' %}" class="btn-cancelar-form">Entrar</a>
      {% endif %}
    </div>

  </div>

</main>
{% endblock %}
