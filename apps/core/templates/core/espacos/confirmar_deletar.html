{% extends 'core/base.html' %}
{% load static %}

{% block extra_css %}
  <link rel="stylesheet" href="{% static 'css/espacos.css' %}">
{% endblock %}

{% block content %}
<main>

  <a href="{% url 'espaco-detalhe' espaco.id %}" class="btn-back">← Voltar para detalhes</a>

  <div class="espaco-form-card" style="max-width: 520px; text-align: center;">

    <h2 class="espaco-form-titulo" style="color: #c0392b;">Confirmar Exclusão</h2>

    <p style="margin: 20px 0;">
      Tem certeza que deseja excluir o espaço
      <strong>{{ espaco.nome }}</strong>?
      Esta ação não pode ser desfeita.
    </p>

    <form method="post" class="form-acoes" style="justify-content: center;">
      {% csrf_token %}
      <button type="submit" class="btn-deletar-confirm">Sim, excluir</button>
      <a href="{% url 'espaco-detalhe' espaco.id %}" class="btn-cancelar-form">Cancelar</a>
    </form>

  </div>

</main>
{% endblock %}
