{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ organizacao.nome }} — SIGEsporte</title>
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/espacos.css' %}">
</head>

<body>

<!-- CABEÇALHO -->
<header class="site-header">
  <div class="logo-wrap">
    <span class="logo-dentro">
      <img src="{% static 'img/LOGO - SIGESPORTE.png' %}" alt="Logo SIGEsporte">
    </span>
  </div>
  <div class="header-actions">
    <a href="{% url 'home' %}" class="btn-header">INÍCIO ></a>
    <a href="#" class="btn-header">ENTRAR ></a>
  </div>
</header>

<main>

  <a href="{% url 'organizacoes-list' %}" class="btn-back">← Voltar para organizações</a>

  <div class="espaco-detalhe-card">

    {% if organizacao.foto %}
      <img class="espaco-detalhe-img" src="{{ organizacao.foto.url }}" alt="{{ organizacao.nome }}">
    {% else %}
      <div class="espaco-detalhe-img espaco-sem-foto">
        <span>Sem foto</span>
      </div>
    {% endif %}

    <div class="espaco-detalhe-info">

      <h1 class="event-title">{{ organizacao.nome }}</h1>

      <p style="margin-top: 12px;"><strong>Descrição:</strong></p>
      <p>{{ organizacao.descricao }}</p>

      <div class="espaco-acoes" style="margin-top: 24px;">
        <a class="btn-editar" href="{% url 'organizacao-editar' organizacao.id %}">Editar</a>
        <a class="btn-deletar" href="{% url 'organizacao-deletar' organizacao.id %}">Excluir</a>
      </div>

    </div>
  </div>

</main>

<!-- FOOTER -->
<footer>
  &copy; 2026 SIGEsporte
</footer>

</body>
</html>
